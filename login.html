<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
       
        body {
            background: linear-gradient(135deg, #2a9d8f, #264653);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
      
        .login-card {
            background-color: #264653;
            backdrop-filter: blur(10px);
            border: 1px solid #264653;
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>


<div class="login-card">
    <h2 class="text-center mb-4">LOGIN</h2>
    
    <form action="#" method="POST">
        

        <div class="form-floating mb-3">
            <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput" class="text-dark">Email Address</label>
        </div>
        
      
        <div class="form-floating mb-3">
            <input type="password" class="form-control text-dark" id="passwordInput" placeholder="Password">
            <label for="passwordInput" class="text-dark">Password</label>
           
            <div class="invalid-feedback text-warning fw-bold">
                Invalid password! Please try again
            </div>
        </div>

        <a href="register.html" class="text-info mb-3 d-block">Don't have an account? Register here.</a>
        <button type="submit" class="btn btn-success w-100 btn-lg mt-2">Sign In</button>
    </form>
</div>


</body>
</html>
