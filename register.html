<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!-- Bootstrap 5 CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
       
        body {
            background: linear-gradient(135deg, #2a9d8f, #264653);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
      
        .register-card {
            background-color: #264653;
            backdrop-filter: blur(10px);
            border: 1px solid #2a9d8f;
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>


<div class="register-card">
    <h2 class="text-center mb-4">Create BuyBuzz Boutique Acccount</h2>
    
    <form action="#" method="POST" onsubmit="event.preventDefault();">
        
  
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Gernes Ashley L. Mular" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Veryfication ID</label>
                <input type="text" class="form-control is-valid" value="402622">
                <div>
                  
                </div>
            </div>
        </div>


       
        <div class="mb-3">
            <label class="form-label">Email Handle</label>
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="BuyBuzzBoutique" required>
                <span class="input-group-text">@gmail.com</span>
            </div>
        </div>


      
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Purpose Creating account</label>
                <select class="form-select" required>
                    <option value="selected disabled">--Select Purpose--</option>
                    <option value="business">Business</option>
                    <option value="my edicational purpose">My Educational Purpose</option>   
                    <option value="my personal use">My Personal Use</option>                
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label d-block">Gender Profile</label>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="male" >
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>
        </div>


        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Retype password" required>
            </div>
        </div>


        
        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms"  required>
            <label class="form-check-label small text-white-50" for="terms">
                I agree to the digital Data Privacy Policy rules.
            </label>
        </div>
        <a href="index.html" class="text-info mb-3 d-block">Already have an account? Sign in here.</a>

        <button type="submit" class="btn btn-success w-100 py-2">Create</button>
    </form>
</div>


</body>
</html>
